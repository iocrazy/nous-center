name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        # vllm + modelscope now live in [project.optional-dependencies].inference
        # (see backend/pyproject.toml). API server code does NOT import them,
        # so CI test venv stays small. Integration tests that genuinely need
        # vllm are in the ignore list below.
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Tests
        # CI runners have no GPU, so the heavy torch/vllm stubs in conftest.py
        # are enough — no need for --forked (which OOMs on a 7GB runner when
        # spawning ~286 subprocesses). Integration smoke needs a live vLLM.
        # `--tb=short -rfE` ensures failure summary prints even if pytest exits
        # with non-zero; `--maxfail=50` prevents one broken file from hiding
        # the rest of the report.
        run: |
          uv run pytest -rfE --tb=short --maxfail=50 -p no:cacheprovider \
            --ignore=tests/test_integration_smoke.py \
            --ignore=tests/test_tts_engine_adapter.py \
            --ignore=tests/test_vllm_adapter.py \
            --ignore=tests/test_workers.py \
            --ignore=tests/test_ws_tts.py
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          CUDA_VISIBLE_DEVICES: ""

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust (for wasm-pack)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
