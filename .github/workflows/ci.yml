name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        # vllm + modelscope now live in [project.optional-dependencies].inference
        # (see backend/pyproject.toml). API server code does NOT import them,
        # so CI test venv stays small. Integration tests that genuinely need
        # vllm are in the ignore list below.
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Tests
        # CI runners have no GPU, so the heavy torch/vllm stubs in conftest.py
        # are enough — no need for --forked (which OOMs on a 7GB runner when
        # spawning ~286 subprocesses). Integration smoke needs a live vLLM.
        # `--tb=short -rfE` ensures failure summary prints even if pytest exits
        # with non-zero; `--maxfail=50` prevents one broken file from hiding
        # the rest of the report.
        #
        # review T2:test_workers / test_ws_tts 实测不需要 GPU(celery 注册断言 / TestClient
        # WS),已从 ignore 移出纳入门禁。剩下 3 个真需要 live vLLM,保留 ignore。
        # review T3:加 --cov 只报告覆盖率(暂不设阈值门槛),让盲区可见。
        run: |
          uv run pytest -rfE --tb=short --maxfail=50 -p no:cacheprovider \
            --cov=src --cov-report=term-missing:skip-covered \
            --ignore=tests/test_integration_smoke.py \
            --ignore=tests/test_tts_engine_adapter.py \
            --ignore=tests/test_vllm_adapter.py
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          CUDA_VISIBLE_DEVICES: ""

      - name: Type check (pyright, non-blocking)
        # review C1:CI 原先无任何 Python 类型检查。pyright 当下对 src 会报存量类型问题
        # (如 Response.body 的 bytes|memoryview),一次性清完超出本 PR 范围 → 先以
        # continue-on-error 接入,让类型错误在 CI 日志里可见、可逐步收敛,不阻断门禁。
        continue-on-error: true
        run: uvx pyright src/api src/services src/utils

  frontend:
    name: Frontend · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust (for wasm-pack)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      # vitest 之前没进 CI(job 只跑 lint+build)→ 前端单测红了没人察觉
      # (CachedHint.test 在 master 长红到 #409 才修)。接进来当门禁。
      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build
