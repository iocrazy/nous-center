version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/configs:/app/configs
      - ${LOCAL_MODELS_PATH:-./models}:/models
      - nous-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/nous.db
      - LOCAL_MODELS_PATH=/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nous-data:
