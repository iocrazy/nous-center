services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mindcenter
      POSTGRES_PASSWORD: mindcenter
      POSTGRES_DB: mindcenter
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindcenter -d mindcenter"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/configs:/app/configs
      - ${LOCAL_MODELS_PATH:-./models}:/models
      - nous-data:/app/data
    environment:
      # Override to sqlite+aiosqlite:///data/nous.db for single-container dev.
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://mindcenter:mindcenter@postgres:5432/mindcenter}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOCAL_MODELS_PATH=/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nous-data:
  pg-data:
  redis-data:
