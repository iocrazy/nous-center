# RTX PRO 6000 Blackwell GSP 固件 bug 缓解(2026-06-23)。
#
# 现象:跑模型时 PRO 6000(Blackwell)GSP 固件崩溃,卡进 NV_ERR_GPU_IN_FULLCHIP_RESET
# 僵死,status=0x0f=NV_ERR_GPU_NOT_FULL_POWER(指向 GC6 动态省电/供电),把同机显示用的
# 3090 一起拖黑 → 开机黑屏 / 整机硬死,只能冷断电(断 AC 2-3min)恢复。属 595/580 open
# 驱动上 Blackwell 的已知固件 bug(open-gpu-kernel-modules #1111/#1151/#1134),换驱动无效。
# 详见 Notion「WRX90 工作站 Ubuntu 启动黑屏排查:GPU0 FULLCHIP_RESET 僵死」。
#
# 关掉 nvidia 动态省电(GC6)—— 直接对着 NOT_FULL_POWER 病因,减少 GSP fullchip-reset 复发。
# 改后需 `sudo update-initramfs -u` + 重启才生效(nvidia 早加载)。由 setup-gpu-mitigations.sh 装。
options nvidia NVreg_DynamicPowerManagement=0
