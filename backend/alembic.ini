# Alembic 配置。sqlalchemy.url 故意留空 —— env.py 从 src.config.get_settings() 注入
# 真实 DATABASE_URL(单一事实来源,不在这里重复/泄漏口令)。
[alembic]
script_location = alembic
prepend_sys_path = .
# 迁移文件名带时间戳前缀,便于排序阅读。
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
