name: lcs
version: "1.0"
description: "LCS 采样期干预(对齐 comfyui-lcs,MIT)— 锐化 Intervene 等,去噪每步沿标定方向推 denoised(肤质锐化/保色)"
author: "comfyui-lcs (MIT) / nous-center"

# LCS 节点产「采样干预描述符」(inline,主进程,无 GPU),接 KSampler 的 interventions 端口 →
# 引擎 _build_interventions 据此在去噪每步挂 post-CFG hook(spec 2026-06-10-sampling-intervention-hook)。
# 描述符 list 可链式(多个 LCS 节点串 intervene_in → intervene),KSampler 一把吃。
# 真标定(光栅 PCA)+ 干预在引擎惰性做(用 pipe.vae,按 VAE 指纹缓存),节点只产参数描述符。

nodes:

  lcs_sharpness_intervene:
    label: "LCS 锐化干预"
    category: image
    badge: LCS
    badgeColor: "var(--accent-2)"
    inputs:
      # 链式:接上游 LCS 节点的 intervene 输出(可选);不接 = 链头。
      - { id: intervene_in, type: intervene, label: "干预链(可选)", optional: true }
    outputs:
      - { id: intervene, type: intervene, label: 干预 }
    widgets:
      # strength>0 更锐 / <0 更糊 / 0 无效。对齐 comfyui-lcs LCSSharpnessIntervene。
      - { name: strength, label: "锐化强度", widget: slider, min: -5, max: 5, step: 0.1, default: 1.0 }
      # 只在采样步窗 [start,end] 内干预(中段最有效;过早/过晚影响构图或无效)。
      - { name: start_step, label: "起始步", widget: slider, min: 0, max: 50, step: 1, default: 5 }
      - { name: end_step, label: "结束步", widget: slider, min: 0, max: 50, step: 1, default: 15 }

  lcs_color_anchor:
    label: "LCS 色彩锚定"
    category: image
    badge: LCS
    badgeColor: "var(--accent-2)"
    inputs:
      - { id: intervene_in, type: intervene, label: "干预链(可选)", optional: true }
    outputs:
      - { id: intervene, type: intervene, label: 干预 }
    widgets:
      # 去噪每步纠正色漂(对齐 comfyui-lcs LCSColorAnchor)。self_anchor=自适应检测色漂拉回(无需参考图,
      # = 原工作流 auto/0.8 语义);smooth=双边滤波平滑色彩。reference 模式(锚到参考图)留后续。
      - name: mode
        label: "模式"
        widget: select
        default: self_anchor
        options:
          - { value: self_anchor, label: "自锚定", description: "自适应检测色漂并拉回(无需参考,默认)" }
          - { value: smooth, label: "平滑", description: "双边滤波平滑色彩场" }
      - { name: intensity, label: "强度", widget: slider, min: 0, max: 1, step: 0.05, default: 0.8 }
