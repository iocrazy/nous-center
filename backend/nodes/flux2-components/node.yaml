name: flux2-components
version: "0.2"
description: "Flux2 / Diffusers 组件节点 — ComfyUI 风格的可组装图像生成节点(V1' Lane C)"
author: "nous-center"

# Port types follow ComfyUI conventions: MODEL / CLIP / VAE / CONDITIONING /
# LATENT / IMAGE. Frontend ReactFlow enforces sourceType === targetType so a
# CLIP output can't be wired into a MODEL input — typed bundles catch
# category mismatches at draw time instead of at sampling.

nodes:

  flux2_load_checkpoint:
    label: "Load Checkpoint"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    inputs: []
    outputs:
      - { id: model, type: MODEL, label: MODEL }
      - { id: clip,  type: CLIP,  label: CLIP }
      - { id: vae,   type: VAE,   label: VAE }
    widgets:
      - { name: file,         label: "整模型", widget: component_select, role: checkpoint }
      - { name: weight_dtype, label: "精度", widget: select, options: [default, bfloat16, float16, fp8_e4m3], default: bfloat16 }
      - { name: device,       label: "显卡", widget: select, options: [auto, "cuda:0", "cuda:1", "cuda:2"], default: auto }
      # 三件同卡同 offload(便捷节点)。
      - name: offload
        label: "Offload"
        widget: select
        default: none
        options:
          - { value: none,     label: "None",          description: "不 offload — 常驻所选卡,最快" }
          - { value: cpu,      label: "CPU offload",   description: "不用时挪 CPU — 慢 3-5× 但塞得下大模型" }
          - { value: "cuda:0", label: "GPU stash → cuda:0", description: "跨卡 offload:权重常驻 cuda:0,forward 时挪到所选卡" }
          - { value: "cuda:1", label: "GPU stash → cuda:1", description: "跨卡 offload:权重常驻 cuda:1,forward 时挪到所选卡" }
          - { value: "cuda:2", label: "GPU stash → cuda:2", description: "跨卡 offload:权重常驻 cuda:2,forward 时挪到所选卡" }
          - { value: stream,   label: "流式分块(大模型跑小卡)", description: "权重驻内存,DiT 分块流式上卡边算边搬(~6× 慢);54G 模型可跑 24G 卡;精度须 bf16" }
      # 整模型架构(spec 2026-06-07):flux2=Flux2-Klein 整模型;z-image=Z-Image-Turbo
      # (走 ZImagePipeline.from_pretrained,distilled 8 步/guidance 0);qwen-edit=Qwen-Image-Edit-2511
      # (编辑/角度控制,需输入图,走 QwenImageEditPlusPipeline,true_cfg 4.0/40 步)。
      - name: adapter_arch
        label: "架构"
        widget: select
        default: flux2
        options:
          - { value: flux2,     label: "Flux2",   description: "Flux2-Klein 整模型(HF-layout)" }
          - { value: z-image,   label: "Z-Image", description: "Z-Image-Turbo 文生图(6B distilled,8 步,guidance=0)" }
          - { value: qwen-edit, label: "Qwen-Edit", description: "Qwen-Image-Edit-2511 编辑/角度(需输入图,true_cfg 4.0,40 步)" }
          - { value: ideogram4, label: "Ideogram-4", description: "Ideogram-4 文生图(9.3B 双 DiT,结构化 JSON caption/文字排版,cfg 7,20 步)" }

  flux2_load_diffusion_model:
    label: "Load Diffusion Model"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    componentRole: diffusion_models
    inputs: []
    outputs:
      - { id: model, type: MODEL, label: MODEL }
    widgets:
      - { name: file,         label: "文件", widget: component_select, role: diffusion_models }
      - { name: weight_dtype, label: "精度", widget: select, options: [default, bfloat16, float16, fp8_e4m3], default: bfloat16 }
      - { name: device,       label: "显卡", widget: select, options: [auto, "cuda:0", "cuda:1", "cuda:2"], default: auto }
      # PR-D / PR-D2:权重 offload 目标(不用时挪去哪)。
      # cpu = enable_model_cpu_offload(慢 3-5× 但塞得下大模型);
      # cuda:N = 跨卡 offload(权重 stash 在 N 卡,forward 前后挪到 device 卡;
      # 用于 2×3090 协作跑大模型场景 — 24+24=48GB 够装 34GB)。
      - name: offload
        label: "Offload"
        widget: select
        default: none
        options:
          - { value: none,     label: "None",          description: "不 offload — 全程 GPU,最快" }
          - { value: cpu,      label: "CPU offload",   description: "权重不用时挪 CPU — 慢 3-5× 但塞得下大模型(34GB 进 24GB 卡)" }
          - { value: "cuda:0", label: "GPU stash → cuda:0", description: "跨卡 offload:权重常驻 cuda:0,forward 时挪到 device 卡" }
          - { value: "cuda:1", label: "GPU stash → cuda:1", description: "跨卡 offload:权重常驻 cuda:1,forward 时挪到 device 卡" }
          - { value: "cuda:2", label: "GPU stash → cuda:2", description: "跨卡 offload:权重常驻 cuda:2,forward 时挪到 device 卡" }
          - { value: stream,   label: "流式分块(大模型跑小卡)", description: "权重驻内存,DiT 分块流式上卡边算边搬(~6× 慢);54G 模型可跑 24G 卡;精度须 bf16" }
      - name: adapter_arch
        label: "架构"
        widget: select
        default: flux2
        options:
          - { value: flux2, label: "Flux2", description: "Flux2 family — Flux2-Klein-9B-True 等 ComfyUI 单文件" }
          - { value: flux1, label: "Flux1", description: "Flux1 family(legacy)" }
          # z-image 单文件分开载入(对齐整装 Load Checkpoint 的 z-image):z_image_turbo_bf16 单文件 DiT
          # + Qwen3 文本编码器(架构选 qwen)+ ae VAE(Flux1 16ch)。引擎经 build_bridged_*
          # (from_single_file)装配成 ZImagePipeline,与整模型同权重(smoke_zimage_singlefile SSIM≥0.95)。
          - { value: z-image, label: "Z-Image", description: "Z-Image 单文件(z_image_turbo_bf16;配 Qwen3 编码器 + ae VAE;8 步 distilled guidance=0)" }
          # ideogram4 双 DiT 单文件:每个 DiT(条件 / 无条件)各用一个本节点(arch=ideogram4)加载,
          # 再经「Ideogram-4 双 DiT 合并」节点合一(对齐 ComfyUI 两 UNETLoader + DualModelGuider)。
          # 配 Qwen3-VL 编码器(架构选 qwen)+ flux2-vae。引擎走 dequant+键转装配 Ideogram4Pipeline。
          - { value: ideogram4, label: "Ideogram-4", description: "Ideogram-4 单 DiT(双 DiT 各一个,经合并节点合一;配 Qwen3-VL 编码器 + flux2 VAE)" }
          - { value: anima, label: "Anima", description: "Anima 2B 自定义 DiT(自动选 AnimaPipeline + qwen3 TE + Qwen-Image VAE)" }

  # Ideogram-4 双 DiT 合并(对齐 ComfyUI DualModelGuider):两个 Load Diffusion Model(arch=ideogram4,
  # 一个条件 DiT ideogram4_fp8_scaled / 一个无条件 DiT ideogram4_unconditional_fp8_scaled)→ 合成一个
  # MODEL(带 unconditional_file)喂 KSampler。非对称 CFG 的两个 DiT 由此节点显式合一。inline(无 GPU)。
  ideogram4_dual_guider:
    label: "Ideogram-4 双 DiT 合并"
    category: image
    badge: Dual
    badgeColor: "var(--info)"
    inputs:
      - { id: model, type: MODEL, label: 条件 DiT }
      - { id: unconditional_model, type: MODEL, label: 无条件 DiT }
    outputs:
      - { id: model, type: MODEL, label: MODEL }
    widgets: []

  flux2_load_clip:
    label: "Load CLIP"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    # PR-C:componentRole=clip → 节点级**聚合**四态 header(ClipAggregateStatusHeader 读 clips[],
    # 全 encoder loaded 才 loaded;任一 loading/failed 优先)。clip_stack 每行仍保留 per-row 状态点。
    componentRole: clip
    inputs: []
    outputs:
      - { id: clip, type: CLIP, label: CLIP }
    widgets:
      - { name: clips, label: "CLIP", widget: clip_stack }
      # 逐组件选卡(2026-06-04):device=该 CLIP 节点(所有 encoder)落哪张卡;
      # auto=跟随 Diffusion Model 卡(旧默认,零回归)。offload 同 Diffusion Model。
      - { name: device,  label: "显卡", widget: select, options: [auto, "cuda:0", "cuda:1", "cuda:2"], default: auto }
      - name: offload
        label: "Offload"
        widget: select
        default: none
        options:
          - { value: none,     label: "None",          description: "不 offload — 常驻所选卡,最快" }
          - { value: cpu,      label: "CPU offload",   description: "不用时挪 CPU — 慢但塞得下大编码器" }
          - { value: "cuda:0", label: "GPU stash → cuda:0", description: "跨卡 stash:权重常驻 cuda:0,forward 时挪到所选卡" }
          - { value: "cuda:1", label: "GPU stash → cuda:1", description: "跨卡 stash:权重常驻 cuda:1,forward 时挪到所选卡" }
          - { value: "cuda:2", label: "GPU stash → cuda:2", description: "跨卡 stash:权重常驻 cuda:2,forward 时挪到所选卡" }
      - { name: type,  label: "架构", widget: select, options: [flux2, flux1, sdxl, sd3, qwen], default: flux2 }

  flux2_load_vae:
    label: "Load VAE"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    componentRole: vae
    inputs: []
    outputs:
      - { id: vae, type: VAE, label: VAE }
    widgets:
      - { name: file,         label: "文件", widget: component_select, role: vae }
      - { name: weight_dtype, label: "精度", widget: select, options: [default, bfloat16, float16], default: bfloat16 }
      # 逐组件选卡(2026-06-04):auto=跟随 Diffusion Model 卡(旧默认,零回归)。
      - { name: device,  label: "显卡", widget: select, options: [auto, "cuda:0", "cuda:1", "cuda:2"], default: auto }
      - name: offload
        label: "Offload"
        widget: select
        default: none
        options:
          - { value: none,     label: "None",          description: "不 offload — 常驻所选卡,最快" }
          - { value: cpu,      label: "CPU offload",   description: "不用时挪 CPU — 慢但塞得下" }
          - { value: "cuda:0", label: "GPU stash → cuda:0", description: "跨卡 stash:权重常驻 cuda:0,forward 时挪到所选卡" }
          - { value: "cuda:1", label: "GPU stash → cuda:1", description: "跨卡 stash:权重常驻 cuda:1,forward 时挪到所选卡" }
          - { value: "cuda:2", label: "GPU stash → cuda:2", description: "跨卡 stash:权重常驻 cuda:2,forward 时挪到所选卡" }

  flux2_load_lora:
    label: "Load LoRA"
    category: image
    badge: LoRA
    badgeColor: "var(--warn)"
    inputs:
      - { id: model, type: MODEL, label: MODEL }
    outputs:
      - { id: model, type: MODEL, label: MODEL }
    widgets:
      - { name: lora_name, label: "LoRA",      widget: lora_select, default: "" }
      - { name: strength,  label: "强度",      widget: slider, min: 0, max: 2, step: 0.05, default: 1.0 }

  flux2_encode_prompt:
    label: "Encode Prompt"
    category: image
    badge: Conditioning
    badgeColor: "var(--info, #3b82f6)"
    inputs:
      - { id: clip, type: CLIP, label: CLIP }
      - { id: text, type: text, label: 文本 }
    outputs:
      - { id: conditioning, type: CONDITIONING, label: CONDITIONING }
    widgets:
      - { name: text,            label: "Prompt",   widget: textarea, rows: 3, default: "" }
      # negative 在 true-CFG 下生效(cfg>1):Flux2 comfy 单文件走标准 Flux2KleinPipeline
      # (is_distilled=False),negative 经预编码 negative_prompt_embeds 做 true-CFG。
      # cfg=1 时无 CFG → negative 被忽略(对齐 ComfyUI:cfg 控制 CFG 是否生效)。
      - { name: negative_prompt, label: "Negative", widget: textarea, rows: 2, default: "" }

  flux2_ksampler:
    label: "KSampler"
    category: image
    badge: Sampler
    badgeColor: "var(--accent-2)"
    inputs:
      - { id: model,         type: MODEL,        label: MODEL }
      - { id: conditioning,  type: CONDITIONING, label: CONDITIONING }
      # 可选输入图(spec 2026-06-07):接 image_input(上传图)或 flux2_vae_decode(链式)的 image 端口。
      # 语义随架构 —— **不是 img2img**:Flux2-Klein = 参考编辑(Kontext,diffusers 原生:参考图编码成干净 token
      # 拼进序列、注意力保身份重绘,采样仍从噪声起,无 strength,支持多参考 image=[list]);Qwen-Edit = 编辑;
      # Z-Image = 真 img2img(配下方 strength)。连了 → 进对应模式;不连 → 纯文生图。引擎按 pipeline 是否
      # 支持 image= 决定注入(Z-Image 文生图 pipe 不支持 → 忽略);零回归。
      - { id: image,         type: image,        label: "输入图 / 参考图(可选)", optional: true }
      # 续采输入(留噪 latent 接力,PR-B2):接上一段 VAE Decode(output_mode=latent)的 latent_ref。
      # 连了 + start_at_step>0 + 加噪关 → 不重加噪从中段续采(KSamplerAdvanced add_noise=disable 语义)。
      # 仅 Z-Image 同 16ch latent 空间;跨架构注入引擎派发前人话报错。不连 = 普通采样(零回归)。
      - { id: init_latent,   type: LATENT_REF,   label: "续采 Latent(可选)", optional: true }
      # 采样期干预(LCS 锐化/保色,spec 2026-06-10):接 LCS 节点产的描述符 list → 引擎去噪每步沿标定
      # 方向推 denoised。不连 = 无干预(零回归)。仅手写循环(Z-Image)+ Flux2 callback 路径有挂钩点。
      - { id: interventions, type: intervene,    label: "采样干预(可选)", optional: true }
    outputs:
      - { id: latent, type: LATENT, label: LATENT }
    widgets:
      - { name: width,      label: "宽度",  widget: slider, min: 256, max: 2048, step: 64, default: 1024 }
      - { name: height,     label: "高度",  widget: slider, min: 256, max: 2048, step: 64, default: 1024 }
      - { name: steps,      label: "步数",  widget: slider, min: 1,   max: 100,  step: 1,  default: 25 }
      - { name: cfg_scale,  label: "CFG",   widget: slider, min: 0,   max: 20,   step: 0.1, default: 4.0 }
      # batch 出图张数(对齐 ComfyUI batch_size)。N>1 一次前向出 N 张 → image_output 网格累积。
      # 显存按 N 近似线性涨(同一 batch 维),大模型大图慎调高。标准 pipe + 段路(非 euler 采样器)均出 N 张。
      - { name: num_images, label: "出图张数", widget: slider, min: 1, max: 8, step: 1, default: 1 }
      # img2img 重绘强度(PR-A2):**仅 Z-Image img2img 用**。默认 1.0 = 全量去噪 ≈ 文生图(零回归)。仅当架构有
      # img2img 变体(Z-Image)+ 连了 image 端口 + <1 时生效(从输入图加噪到该比例再去噪)。**Flux2-Klein 接图
      # 走参考编辑(Kontext),Qwen-Edit 走编辑 —— 两者都忽略此值**,调它无效果。
      - { name: strength,   label: "重绘强度(仅 Z-Image img2img)", widget: slider, min: 0, max: 1, step: 0.05, default: 1.0 }
      # 复刻 ComfyUI KSampler 两下拉(结构对齐,选项是 diffusers 的)。Flux2 是 flow-matching,
      # diffusers 只 3 个采样器兼容;sampler_name=scheduler 类,scheduler=sigma 调度(use_*_sigmas)。
      # 选了不支持的 → 后端 _validate_sampler_scheduler 清晰报错不出图。
      - name: sampler_name
        label: "采样器"
        widget: select
        default: euler
        options:
          - { value: euler, label: "Euler",          description: "Flux2 默认 / 推荐" }
          - { value: euler_ancestral, label: "Euler Ancestral", description: "Z-Image 支持(RF 手写,逐步加噪)；Flux2 不支持" }
          - { value: dpmpp_2m, label: "DPM++ 2M", description: "Z-Image 支持(RF 手写,二阶多步,质量优于 Euler)；Flux2 不支持" }
          - { value: dpmpp_2s_ancestral, label: "DPM++ 2S Ancestral", description: "Z-Image 支持(RF 手写,二阶 ancestral,NFE 翻倍)；Flux2 不支持" }
          - { value: dpmpp_2m_sde, label: "DPM++ 2M SDE", description: "Z-Image 支持(RF 手写,二阶随机,细节质感)；Flux2 不支持" }
          - { value: dpmpp_3m_sde, label: "DPM++ 3M SDE", description: "Z-Image 支持(RF 手写,三阶随机)；Flux2 不支持" }
          - { value: dpmpp_sde, label: "DPM++ SDE", description: "Z-Image 支持(RF 手写,单步二阶随机,NFE 翻倍)；Flux2 不支持" }
          - { value: heun,  label: "Heun (2 阶)",    description: "diffusers Heun 不接 custom sigmas → Flux2 不支持" }
          - { value: lcm,   label: "LCM",            description: "LCM 蒸馏模型专用 — True-v2 等普通模型出错图" }
      - name: scheduler
        label: "调度器"
        widget: select
        default: normal
        # 对齐 ComfyUI 9 个调度器(sigma 算法 port 自 comfy/samplers.py,数值经 ground truth 验)。
        # normal/karras/exponential/beta 走 diffusers use_*_sigmas;simple/sgm_uniform/ddim_uniform/
        # linear_quadratic/kl_optimal 手动算 sigma 注入 pipe(sigmas=...)。
        options:
          - { value: normal,           label: "Normal",           description: "线性默认 — 参考库基线" }
          - { value: karras,           label: "Karras",           description: "低/高 step 都更平滑 — 推荐细节" }
          - { value: exponential,      label: "Exponential",      description: "指数衰减 — 早期细节更强" }
          - { value: beta,             label: "Beta",             description: "Beta 分布 — 风格变化温和" }
          - { value: sgm_uniform,      label: "SGM Uniform",      description: "均匀 timestep — 很多 ComfyUI 工作流默认" }
          - { value: simple,           label: "Simple",           description: "简单等距取 sigma 表" }
          - { value: ddim_uniform,     label: "DDIM Uniform",     description: "DDIM 均匀(为 epsilon/v-pred 设计,flow-match 上效果待验)" }
          - { value: linear_quadratic, label: "Linear Quadratic", description: "前段线性后段二次 — Mochi 风格" }
          - { value: kl_optimal,       label: "KL Optimal",       description: "KL 最优(arctan 插值)" }
      - { name: seed,       label: "Seed",  widget: input, default: "" }
      # 留噪 latent 接力 / 分段采样(PR-B2,对齐 ComfyUI KSamplerAdvanced)。默认全关 = 整段采样(零回归)。
      # 仅 Z-Image(同 16ch latent 空间)生效:把一次去噪劈成 base(end_at_step 处留噪、output_mode=latent
      # 导出带噪 latent)+ refiner(start_at_step 注入 + 加噪关 续采到 0),两段各用不同 LoRA/CFG/采样器。
      # 跨模型(Flux2)latent 物理不兼容,走像素链(路 A 参考编辑 / img2img),别用此组。
      - { name: start_at_step, label: "起始步(续采)", widget: slider, min: 0, max: 100, step: 1, default: 0 }
      # 结束步:留空或 -1 = 跑到底(不截断);>=0 = 停在该步(配「保留余噪」带噪交接给下段)。
      - { name: end_at_step, label: "结束步(留噪;空=到底)", widget: input, default: "" }
      - { name: add_noise, label: "加噪(注入 latent 时;续采关此项)", widget: checkbox, default: true }
      - { name: return_with_leftover_noise, label: "保留余噪(base 段交接用)", widget: checkbox, default: false }
      # 对齐 ComfyUI control_after_generate(纯前端,每次 Run 后按模式更新上面的 seed):
      # fixed=不变 / increment=+1 / decrement=-1 / randomize=随机。本 widget 不传后端
      # (前端在 Run 完成后改 seed 值)。default=fixed(比 ComfyUI 的 randomize 保守,
      # 单图调试时 seed 不乱跳;想批量探索手动选 randomize)。
      - name: control_after_generate
        label: "生成后控制"
        widget: select
        default: fixed
        options:
          - { value: fixed,     label: "固定 (fixed)",      description: "seed 不变 — 复现同一张" }
          - { value: increment, label: "递增 (increment)",  description: "每次 Run 后 seed +1" }
          - { value: decrement, label: "递减 (decrement)",  description: "每次 Run 后 seed -1" }
          - { value: randomize, label: "随机 (randomize)",  description: "每次 Run 后随机新 seed — 批量探索构图" }

  flux2_vae_decode:
    label: "VAE Decode"
    category: image
    badge: Decoder
    badgeColor: "var(--err)"
    inputs:
      - { id: vae,    type: VAE,    label: VAE }
      - { id: latent, type: LATENT, label: LATENT }
    # Single `image` port matching what image_output expects so VAEDecode
    # can wire straight into the existing ImageOutputNode. The executor
    # returns the same {image_url, media_type, width, height} bundle
    # image_generate emits — workflow_executor forwards the full dict.
    outputs:
      - { id: image, type: image, label: 图像 }
      # 留噪 latent 接力(PR-B2):output_mode=latent 时产 latent_ref(落盘真 latent 引用),接下游
      # KSampler 的 init_latent 端口续采。output_mode=image 时此端口无输出(下游续采取不到 = 纯出图)。
      - { id: latent_ref, type: LATENT_REF, label: "Latent(接力)" }
    widgets:
      # 路 B(spec 2026-06-08,PR-B1):输出模式。默认 image=解码出图(现有行为,字节零回归);
      # latent=不解码,把真 latent 张量落盘传 latent_ref(同空间真 latent 接力,下游 sample_from_latent
      # 注入 latents= 接续去噪)。latent 模式仅同 latent 空间(同模型 / 同 16ch 空间)有意义。
      - name: output_mode
        label: "输出"
        widget: select
        default: image
        options:
          - { value: image,  label: "图像(decode)", description: "VAE 解码出图 — 默认,单采样工作流不变" }
          - { value: latent, label: "Latent(接力)", description: "不解码,导出真 latent 给下游 sample_from_latent 接续去噪(同空间)" }
