name: flux2-components
version: "0.2"
description: "Flux2 / Diffusers 组件节点 — ComfyUI 风格的可组装图像生成节点(V1' Lane C)"
author: "nous-center"

# Port types follow ComfyUI conventions: MODEL / CLIP / VAE / CONDITIONING /
# LATENT / IMAGE. Frontend ReactFlow enforces sourceType === targetType so a
# CLIP output can't be wired into a MODEL input — typed bundles catch
# category mismatches at draw time instead of at sampling.

nodes:

  flux2_load_checkpoint:
    label: "Load Checkpoint"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    inputs: []
    outputs:
      - { id: model, type: MODEL, label: MODEL }
      - { id: clip,  type: CLIP,  label: CLIP }
      - { id: vae,   type: VAE,   label: VAE }
    widgets:
      - { name: model_key,    label: "模型", widget: model_select, filter: image, default: "flux2-klein-9b-true-v2-fp8mixed" }
      - { name: weight_dtype, label: "精度", widget: select, options: [default, bfloat16, float16, fp8_e4m3], default: bfloat16 }
      - { name: device,       label: "显卡", widget: select, options: [auto, "cuda:0", "cuda:1", "cuda:2"], default: auto }

  flux2_load_diffusion_model:
    label: "Load Diffusion Model"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    componentRole: diffusion_models
    inputs: []
    outputs:
      - { id: model, type: MODEL, label: MODEL }
    widgets:
      - { name: file,         label: "文件", widget: component_select, role: diffusion_models }
      - { name: weight_dtype, label: "精度", widget: select, options: [default, bfloat16, float16, fp8_e4m3], default: bfloat16 }
      - { name: device,       label: "显卡", widget: select, options: [auto, "cuda:0", "cuda:1", "cuda:2"], default: auto }
      - { name: adapter_arch, label: "架构", widget: select, options: [flux2, flux1], default: flux2 }

  flux2_load_clip:
    label: "Load CLIP"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    # 动态多 CLIP:clip_stack 每行自带状态点(多文件,节点级单 file 四态头不适配)。
    inputs: []
    outputs:
      - { id: clip, type: CLIP, label: CLIP }
    widgets:
      - { name: clips, label: "CLIP", widget: clip_stack }
      - { name: type,  label: "架构", widget: select, options: [flux2, flux1, sdxl, sd3, qwen], default: flux2 }

  flux2_load_vae:
    label: "Load VAE"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    componentRole: vae
    inputs: []
    outputs:
      - { id: vae, type: VAE, label: VAE }
    widgets:
      - { name: file,         label: "文件", widget: component_select, role: vae }
      - { name: weight_dtype, label: "精度", widget: select, options: [default, bfloat16, float16], default: bfloat16 }

  flux2_load_lora:
    label: "Load LoRA"
    category: image
    badge: LoRA
    badgeColor: "var(--warn)"
    inputs:
      - { id: model, type: MODEL, label: MODEL }
    outputs:
      - { id: model, type: MODEL, label: MODEL }
    widgets:
      - { name: lora_name, label: "LoRA",      widget: lora_select, default: "" }
      - { name: strength,  label: "强度",      widget: slider, min: 0, max: 2, step: 0.05, default: 1.0 }

  flux2_encode_prompt:
    label: "Encode Prompt"
    category: image
    badge: Conditioning
    badgeColor: "var(--info, #3b82f6)"
    inputs:
      - { id: clip, type: CLIP, label: CLIP }
      - { id: text, type: text, label: 文本 }
    outputs:
      - { id: conditioning, type: CONDITIONING, label: CONDITIONING }
    widgets:
      - { name: text,            label: "Prompt",   widget: textarea, rows: 3, default: "" }
      # Flux2 / Flux2Klein 不支持 negative prompt — encode_prompt helper
      # 内部用 inspect.signature 过滤掉,留空即可。ERNIE / SD 等支持
      # negative prompt 的 pipeline 会自动 honor 这个字段。
      - { name: negative_prompt, label: "Negative", widget: textarea, rows: 2, default: "" }

  flux2_ksampler:
    label: "KSampler"
    category: image
    badge: Sampler
    badgeColor: "var(--accent-2)"
    inputs:
      - { id: model,         type: MODEL,        label: MODEL }
      - { id: conditioning,  type: CONDITIONING, label: CONDITIONING }
    outputs:
      - { id: latent, type: LATENT, label: LATENT }
    widgets:
      - { name: width,      label: "宽度",  widget: slider, min: 256, max: 2048, step: 64, default: 1024 }
      - { name: height,     label: "高度",  widget: slider, min: 256, max: 2048, step: 64, default: 1024 }
      - { name: steps,      label: "步数",  widget: slider, min: 1,   max: 100,  step: 1,  default: 25 }
      - { name: cfg_scale,  label: "CFG",   widget: slider, min: 0,   max: 20,   step: 0.1, default: 4.0 }
      - { name: seed,       label: "Seed",  widget: input, default: "" }

  flux2_vae_decode:
    label: "VAE Decode"
    category: image
    badge: Decoder
    badgeColor: "var(--err)"
    inputs:
      - { id: vae,    type: VAE,    label: VAE }
      - { id: latent, type: LATENT, label: LATENT }
    # Single `image` port matching what image_output expects so VAEDecode
    # can wire straight into the existing ImageOutputNode. The executor
    # returns the same {image_url, media_type, width, height} bundle
    # image_generate emits — workflow_executor forwards the full dict.
    outputs:
      - { id: image, type: image, label: 图像 }
    widgets:
      - { name: url_ttl_seconds, label: "URL 有效期(秒)", widget: input, default: "3600" }
