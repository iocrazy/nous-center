name: seedvr2
version: "2.0"
description: "SeedVR2 超分(三节点对齐 ComfyUI)— DiT 加载 + VAE 加载 + 增强(图→图 one-step upscaler)"
author: "NumZ (ComfyUI-SeedVR2_VideoUpscaler, Apache 2.0) / nous-center"

# 对齐 ComfyUI 最新三节点(NumZ interfaces/):
#   seedvr2_load_dit  (inline)→ 产 SEEDVR2_DIT 配置 dict(model/device/blockswap/attention)
#   seedvr2_load_vae  (inline)→ 产 SEEDVR2_VAE 配置 dict(model/device/tiling)
#   seedvr2_upscale   (dispatch)→ image + dit + vae → 超分图(真加载在此,经 runner)
# 两个 loader 只 bundle 配置(惰性,不真加载,像 flux2 loader 产描述符);真加载 + 4 阶段在增强节点。
# 端口类型 seedvr2_dit / seedvr2_vae 让 UI 连线类型校验(只能 DiT→dit / VAE→vae)。spec
# docs/superpowers/specs/2026-06-02-seedvr2-three-node-comfyui-aligned-design.md。

nodes:

  # --- DiT 加载(inline,产配置)-------------------------------------------------
  seedvr2_load_dit:
    label: "SeedVR2 加载 DiT"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    inputs: []
    outputs:
      - { id: dit, type: seedvr2_dit, label: DiT }
    widgets:
      # 磁盘感知白名单下拉(盘上有标已就绪 / 其余标可下载;选项由 /components/seedvr2-dit 动态给)。
      - { name: dit_model, label: "DiT 模型", widget: seedvr2_model_select, default: seedvr2_ema_7b_fp8_e4m3fn_mixed_block35_fp16.safetensors }
      - name: device
        label: "显卡"
        widget: select
        default: auto
        options:
          - { value: auto, label: "自动" }
          - { value: "cuda:0", label: "cuda:0" }
          - { value: "cuda:1", label: "cuda:1" }
          - { value: "cuda:2", label: "cuda:2" }
      # BlockSwap:把 N 个 transformer 块在 device↔offload_device 间换出,7B 塞 24GB 3090。
      # 0=关;3B 0-32、7B 0-36。需 offload_device != device(且非 none)。
      - { name: blocks_to_swap, label: "BlockSwap 块数", widget: slider, min: 0, max: 36, step: 1, default: 0 }
      - { name: swap_io_components, label: "换出 I/O 组件", widget: checkbox, default: false }
      - name: offload_device
        label: "Offload 到"
        widget: select
        default: none
        options:
          - { value: none, label: "None(不 offload,最快)" }
          - { value: cpu, label: "CPU(省显存,慢)" }
          - { value: "cuda:0", label: "cuda:0" }
          - { value: "cuda:1", label: "cuda:1" }
          - { value: "cuda:2", label: "cuda:2" }
      - name: attention_mode
        label: "Attention"
        widget: select
        default: sdpa
        options:
          - { value: sdpa, label: "SDPA", description: "PyTorch 原生(flash_attn 未装,SeedVR2 支持 SDPA 回退)" }

  # --- VAE 加载(inline,产配置)-----------------------------------------------
  seedvr2_load_vae:
    label: "SeedVR2 加载 VAE"
    category: image
    badge: Loader
    badgeColor: "var(--accent)"
    inputs: []
    outputs:
      - { id: vae, type: seedvr2_vae, label: VAE }
    widgets:
      # VAE 白名单当前只有 1 个(ema_vae_fp16),固定 select。
      - name: vae_model
        label: "VAE 模型"
        widget: select
        default: ema_vae_fp16.safetensors
        options:
          - { value: ema_vae_fp16.safetensors, label: "ema_vae fp16", description: "SeedVR2 专用 video VAE(fp16)" }
      - name: device
        label: "显卡"
        widget: select
        default: auto
        options:
          - { value: auto, label: "自动" }
          - { value: "cuda:0", label: "cuda:0" }
          - { value: "cuda:1", label: "cuda:1" }
          - { value: "cuda:2", label: "cuda:2" }
      # 分块编码/解码:大图不爆 VAE 显存。tile_size/overlap 单位像素。
      - { name: encode_tiled, label: "分块编码", widget: checkbox, default: false }
      - { name: encode_tile_size, label: "编码块大小", widget: slider, min: 128, max: 1024, step: 64, default: 512 }
      - { name: encode_tile_overlap, label: "编码块重叠", widget: slider, min: 0, max: 256, step: 16, default: 64 }
      - { name: decode_tiled, label: "分块解码", widget: checkbox, default: false }
      - { name: decode_tile_size, label: "解码块大小", widget: slider, min: 128, max: 1024, step: 64, default: 512 }
      - { name: decode_tile_overlap, label: "解码块重叠", widget: slider, min: 0, max: 256, step: 16, default: 64 }
      - name: offload_device
        label: "Offload 到"
        widget: select
        default: none
        options:
          - { value: none, label: "None" }
          - { value: cpu, label: "CPU" }
          - { value: "cuda:0", label: "cuda:0" }
          - { value: "cuda:1", label: "cuda:1" }
          - { value: "cuda:2", label: "cuda:2" }

  # --- 增强(dispatch,真加载 + 超分)------------------------------------------
  seedvr2_upscale:
    label: "SeedVR2 增强"
    category: image
    badge: Upscaler
    badgeColor: "var(--accent-2)"
    inputs:
      - { id: image, type: image, label: 图像 }
      # dit/vae 可选:连了用三节点配置;不连则 runner 用默认(向后兼容旧单节点工作流)。
      - { id: dit, type: seedvr2_dit, label: DiT }
      - { id: vae, type: seedvr2_vae, label: VAE }
    outputs:
      - { id: image, type: image, label: 图像 }
    widgets:
      - { name: resolution, label: "目标分辨率(短边)", widget: slider, min: 256, max: 2160, step: 16, default: 1080 }
      - { name: max_resolution, label: "长边上限(0=不限)", widget: slider, min: 0, max: 4320, step: 16, default: 0 }
      - { name: batch_size, label: "批大小", widget: slider, min: 1, max: 16, step: 1, default: 1 }
      # uniform_batch_size:批内统一尺寸(批/视频场景;单图无影响)。对齐 ComfyUI。
      - { name: uniform_batch_size, label: "统一批尺寸", widget: checkbox, default: false }
      - name: color_correction
        label: "色彩校正"
        widget: select
        default: lab
        options:
          - { value: lab, label: "LAB", description: "LAB 色彩空间匹配 — 通用最稳(默认)" }
          - { value: wavelet, label: "Wavelet", description: "小波分解匹配 — 保高频细节" }
          - { value: wavelet_adaptive, label: "Wavelet 自适应", description: "自适应小波" }
          - { value: hsv, label: "HSV", description: "HSV 色调匹配" }
          - { value: adain, label: "AdaIN", description: "自适应实例归一化" }
          - { value: none, label: "无", description: "不做色彩校正" }
      # temporal_overlap / prepend_frames:**视频**帧间参数(单图=0 无影响),对齐 ComfyUI 保留。
      - { name: temporal_overlap, label: "时间重叠(视频)", widget: slider, min: 0, max: 32, step: 1, default: 0 }
      - { name: prepend_frames, label: "前置帧(视频)", widget: slider, min: 0, max: 32, step: 1, default: 0 }
      - { name: input_noise_scale, label: "输入噪声", widget: slider, min: 0, max: 1, step: 0.01, default: 0.0 }
      - { name: latent_noise_scale, label: "latent 噪声", widget: slider, min: 0, max: 1, step: 0.01, default: 0.0 }
      # offload_device:增强阶段张量 offload 目标(对齐 ComfyUI enhance 节点的 offload_device)。
      # 默认 cpu(峰值显存友好)。load-time(进 setup_generation_context tensor_offload_device)。
      - name: offload_device
        label: "Offload 到"
        widget: select
        default: cpu
        options:
          - { value: cpu, label: "CPU(省显存)" }
          - { value: none, label: "None(全程 GPU,最快)" }
          - { value: "cuda:0", label: "cuda:0" }
          - { value: "cuda:1", label: "cuda:1" }
          - { value: "cuda:2", label: "cuda:2" }
      - { name: enable_debug, label: "调试日志", widget: checkbox, default: false }
      - { name: seed, label: "Seed", widget: input, default: "" }
      # seed 生成后控制(纯前端,Run 完成后按模式更新上面的 seed)。同 KSampler;applySeedControl 通用。
      # 注:SeedVR2 是 one-step,seed 对出图影响很小,默认 fixed。
      - name: control_after_generate
        label: "生成后控制"
        widget: select
        default: fixed
        options:
          - { value: fixed,     label: "固定 (fixed)",      description: "seed 不变 — 复现同一张" }
          - { value: increment, label: "递增 (increment)",  description: "每次 Run 后 seed +1" }
          - { value: decrement, label: "递减 (decrement)",  description: "每次 Run 后 seed -1" }
          - { value: randomize, label: "随机 (randomize)",  description: "每次 Run 后随机新 seed" }
      - { name: url_ttl_seconds, label: "URL 有效期(秒)", widget: input, default: "3600" }
