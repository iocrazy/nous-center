# Model registry. Each entry: {id, type, adapter, paths, vram_mb, ...}.
#
# resident: bool        — true → never auto-unloaded by the idle checker;
#                         preloaded at startup (see preload_order).
# preload_order: int    — startup preload priority, ASCENDING (lower loads
#                         first). Only meaningful when resident: true.
#                         Omit → preloaded last, after all ordered entries.
#                         preload is fail-soft: one model's failure records
#                         into _load_failures (surfaced on /health) and does
#                         NOT block API server startup. See spec 4.2/4.3.
models:
- adapter: src.workers.tts_engines.cosyvoice2.CosyVoice2Engine
  id: cosyvoice2
  paths:
    main: speech/cosyvoice2-0.5b
  resident: false
  type: tts
  vram_mb: 3000
- adapter: src.workers.tts_engines.indextts2.IndexTTS2Engine
  id: indextts2
  paths:
    main: speech/indextts-2
  resident: false
  type: tts
  vram_mb: 4000
- adapter: src.workers.tts_engines.moss_tts.MOSSTTSEngine
  id: moss_tts
  paths:
    main: speech/moss-tts
  resident: false
  type: tts
  vram_mb: 8000
- adapter: src.workers.tts_engines.qwen3_tts.Qwen3TTSBaseEngine
  id: qwen3_tts_base
  paths:
    main: speech/qwen3-tts-1.7b-base
  resident: false
  type: tts
  vram_mb: 4000
- adapter: src.workers.tts_engines.qwen3_tts.Qwen3TTSCustomVoiceEngine
  id: qwen3_tts_customvoice
  paths:
    main: speech/qwen3-tts-1.7b-customvoice
  resident: false
  type: tts
  vram_mb: 4000
- adapter: src.workers.tts_engines.qwen3_tts.Qwen3TTSVoiceDesignEngine
  id: qwen3_tts_voicedesign
  paths:
    main: speech/qwen3-tts-1.7b-voicedesign
  resident: false
  type: tts
  vram_mb: 4000
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: qwen35-35b-a3b
  paths:
    main: llm/Qwen3.5-35B-A3B
  type: llm
  vram_mb: 68595
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: qwen3_5_35b_a3b_gptq_int4
  paths:
    main: llm/Qwen3.5-35B-A3B-GPTQ-Int4
  resident: false
  type: llm
  vram_mb: 23325
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: qwen3_embedding_4b
  paths:
    main: text/embedding/Qwen3-Embedding-4B
  type: embedding
  vram_mb: 9500
  ttl_seconds: 3600
  params:
    vllm_runner: pooling      # embedding 模型走 vLLM pooling runner(/v1/embeddings)
    max_model_len: 8192       # 模型支持 32k;embedding 输入给 8k 足够,省 KV/激活
    # auto 公式(权重+4G KV+1G)对 pooling 偏紧:8k 长输入 profile 激活峰值吃掉后
    # KV 块分不出 →「No available memory for cache blocks」。显式给足(96G 卡≈19G)。
    gpu_memory_utilization: 0.2
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: qwen3_embedding_8b
  paths:
    main: text/embedding/Qwen3-Embedding-8B
  type: embedding
  vram_mb: 17500
  ttl_seconds: 3600
  params:
    vllm_runner: pooling
    max_model_len: 8192
    gpu_memory_utilization: 0.3   # 8B 权重 15.3G,同上口径(96G 卡≈29G)
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: qwen3_6_35b_a3b_fp8
  paths:
    main: llm/Qwen3.6-35B-A3B-FP8
  resident: false
  type: llm
  vram_mb: 35756
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: gemma-4-26b-a4b-it
  paths:
    main: llm/gemma-4-26B-A4B-it
  type: llm
  vram_mb: 49252
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: gemma-4-26b-a4b-it-gptq-int4
  paths:
    main: llm/gemma-4-26B-A4B-it-GPTQ-Int4
  type: llm
  vram_mb: 14000
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: gemma-4-26b-a4b-it-awq-4bit
  paths:
    main: llm/gemma-4-26B-A4B-it-AWQ-4bit
  type: llm
  vram_mb: 16421
- adapter: src.services.inference.llm_vllm.VLLMAdapter
  id: qwen2_5_vl_7b_instruct
  paths:
    main: llm/Qwen2.5-VL-7B-Instruct
  resident: false
  type: llm
  vram_mb: 14000
- adapter: src.workers.tts_engines.voxcpm2.VoxCPM2Engine
  id: voxcpm2
  paths:
    main: speech/VoxCPM2
  resident: false
  type: tts
  vram_mb: 8000
