# hardware.yaml — 实际生效的 GPU 拓扑（代码加载此文件，唯一真相源）
#
# 当前 = Pro 6000 + 2x3090 三卡布局（两张 3090 之间有 NVLink bridge）。
# 索引 = PCI_BUS_ID（与 nvidia-smi 一致；backend/.env 强制
# CUDA_DEVICE_ORDER=PCI_BUS_ID，否则 torch 默认 FASTEST_FIRST 会把 Pro 6000
# 排到 cuda:0，与本 yaml + nvidia-smi 错位，导致 ModelManager
# get_best_gpu(nvidia-smi index) 喂给 torch 当 cuda:N 装错卡）:
#   GPU 0: RTX 3090 (01:00)  24 GB  → 显示卡（驱动 Xorg/GNOME）——禁止放任何计算！
#                                     在显示卡上加载模型会撑爆 595 开源驱动的 NVKMS
#                                     显存分配（NvKmsKapiMemory，GPU 0x100=bus01）→ 桌面掉登录。
#   GPU 1: RTX Pro 6000 Blackwell  96 GB  → llm（专用，不放 image）
#   GPU 2: RTX 3090 (9A:00)  24 GB  → tts + image（共用这张 24GB 3090）
#
# image 原本钉在 GPU 0，一出图就崩桌面，已移到 GPU 2（与 tts 共用，2026-06-22）。
# 两张 3090（GPU 0 / GPU 2）之间有 NVLink，但 GPU 0 是显示卡，不能用于 llm tp；
# 若要 NVLink tp，需先把显示器接到别的卡、腾空 GPU 0 再用 [0,2] + nvlink:true。
#
# 字段语义：
#   id      group 唯一标识，runner / scheduler 用它寻址
#   gpus    该 group 占用的 GPU index 列表（cuda:N 的 N）
#   nvlink  组内 GPU 是否 NVLink 互联；vLLM tp 模型强约束 nvlink:true
#   role    image / llm / tts —— 节点按 role 找 group
#   vram_gb 整个 group 的合计 VRAM
#
# V1.5 manual-only：不解析 nvidia-smi topo -m，无 detection 字段。
groups:
  - id: llm
    gpus: [1]              # Pro 6000 96GB
    nvlink: false
    role: llm
    vram_gb: 96

  - id: image
    gpus: [2]              # 移到 GPU2 3090（原为 GPU0 显示卡，跑图会崩桌面）；与 tts 共用 24GB
    nvlink: false
    role: image
    vram_gb: 24

  - id: tts
    gpus: [2]              # 另一张 3090
    nvlink: false
    role: tts
    vram_gb: 24
